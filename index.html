<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SportHaus Live</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--s:1;}
html,body{background:transparent;overflow:hidden;font-family:'Montserrat',sans-serif;}

/* === CARD WRAPPER (medallion lives here, outside overflow:hidden) === */
.card-wrap{
  position:relative;
  width:calc(540px*var(--s));
  padding-top:calc(28px*var(--s));
}
.card{
  width:100%;
  position:relative;
  background:radial-gradient(circle at 50% -15%,#1c1c1c,#060606 65%);
  border:1px solid rgba(255,255,255,.16);
  border-radius:calc(26px*var(--s));
  padding:calc(18px*var(--s)) calc(22px*var(--s)) calc(18px*var(--s));
  box-shadow:0 0 calc(50px*var(--s)) rgba(0,0,0,.8);
  overflow:hidden;
}
.card::after{
  content:'';position:absolute;left:8%;right:8%;top:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);
}

/* === MEDALLION === */
.sh-medallion{
  position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:10;
  width:calc(56px*var(--s));height:calc(56px*var(--s));border-radius:50%;
  background:#080808;border:2px solid rgba(255,255,255,.8);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  box-shadow:0 0 calc(18px*var(--s)) rgba(255,255,255,.28),0 0 0 calc(1px*var(--s)) rgba(255,255,255,.12);
}
.sh-medallion img{width:82%;height:82%;object-fit:contain;}

/* === AMBIENT GLOW === */
.ambient{
  position:absolute;bottom:0;left:0;right:0;height:calc(100px*var(--s));
  background:radial-gradient(ellipse at 50% 140%,rgba(60,100,50,.22),transparent 70%);
  pointer-events:none;
}

/* === HEADER === */
.head{
  display:flex;align-items:center;justify-content:center;gap:calc(8px*var(--s));
  font-family:'Bebas Neue',sans-serif;font-size:calc(16px*var(--s));
  letter-spacing:calc(3px*var(--s));color:#bbb;
  margin-bottom:calc(14px*var(--s));
}
.live-dot{
  width:calc(9px*var(--s));height:calc(9px*var(--s));border-radius:50%;
  background:#ff3c3c;flex-shrink:0;animation:blink 1.2s infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.1;}}

/* === SCORE AREA === */
.score-area{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:calc(12px*var(--s));
}
.team-side{display:flex;align-items:center;gap:calc(10px*var(--s));}
.team-side.home{flex-direction:row-reverse;}
.team-logo{width:calc(54px*var(--s));height:calc(54px*var(--s));object-fit:contain;
  filter:drop-shadow(0 calc(3px*var(--s)) calc(10px*var(--s)) rgba(0,0,0,.55));}
.team-abbr{font-family:'Bebas Neue',sans-serif;font-size:calc(26px*var(--s));letter-spacing:1px;color:#eee;}
.score-block{display:flex;align-items:center;gap:calc(8px*var(--s));}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:calc(72px*var(--s));line-height:1;color:#fff;}
.score-dash{font-family:'Bebas Neue',sans-serif;font-size:calc(36px*var(--s));color:#444;line-height:1;}

/* === STATE ROW (outs + bases + count) === */
.state-row{
  display:flex;align-items:center;justify-content:center;gap:calc(18px*var(--s));
  margin-bottom:calc(14px*var(--s));
}
.outs-block{display:flex;align-items:center;gap:calc(5px*var(--s));}
.out-dot{
  width:calc(11px*var(--s));height:calc(11px*var(--s));border-radius:50%;
  border:1.5px solid rgba(255,255,255,.35);background:transparent;
}
.out-dot.on{background:#f4f0e8;border-color:#f4f0e8;}
.state-label{font-family:'Bebas Neue',sans-serif;font-size:calc(10px*var(--s));
  letter-spacing:1px;color:#555;margin-left:calc(3px*var(--s));}
.bases-svg{width:calc(38px*var(--s));height:calc(38px*var(--s));}
.count-badge{
  font-family:'Bebas Neue',sans-serif;font-size:calc(20px*var(--s));
  letter-spacing:1px;color:#ddd;
}

/* === CHE + INNINGS TABLE === */
.innings-wrap{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
  border-radius:calc(14px*var(--s));padding:calc(8px*var(--s)) calc(10px*var(--s));
  margin-bottom:calc(12px*var(--s));overflow-x:auto;
}
.innings-table{
  width:100%;border-collapse:collapse;
  font-family:'Bebas Neue',sans-serif;font-size:calc(12px*var(--s));
  letter-spacing:.5px;color:#aaa;
}
.innings-table td{padding:calc(3px*var(--s)) calc(4px*var(--s));text-align:center;white-space:nowrap;}
.innings-table .lbl{text-align:left;color:#666;font-size:calc(11px*var(--s));padding-right:calc(6px*var(--s));}
.innings-table .sep{border-left:1px solid rgba(255,255,255,.12);color:#555;}
.innings-table .che-lbl{color:#555;font-size:calc(10px*var(--s));}
.innings-table .tot{color:#fff;font-size:calc(13px*var(--s));}
.innings-table .current-inn{color:#fff;}

/* === PITCH BOX === */
.pitch-area{
  display:flex;align-items:stretch;gap:calc(10px*var(--s));
  margin-bottom:calc(12px*var(--s));
}
/* Strike zone */
.zone-wrap{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:calc(14px*var(--s));padding:calc(10px*var(--s)) calc(12px*var(--s));
  display:flex;flex-direction:column;align-items:center;gap:calc(5px*var(--s));
  flex-shrink:0;
}
.zone-label{font-family:'Bebas Neue',sans-serif;font-size:calc(9px*var(--s));
  letter-spacing:2px;color:#555;}
.zone-svg{width:calc(80px*var(--s));height:calc(100px*var(--s));}
/* Pitch info (right side) */
.pitch-info{
  flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:calc(14px*var(--s));padding:calc(10px*var(--s)) calc(14px*var(--s));
  display:flex;flex-direction:column;gap:calc(8px*var(--s));
}
.pitch-type{font-family:'Bebas Neue',sans-serif;font-size:calc(15px*var(--s));
  letter-spacing:1.5px;color:#999;}
/* Two-column row: MPH left, result right */
.pitch-row{display:flex;align-items:flex-start;gap:calc(10px*var(--s));}
.pitch-left{display:flex;flex-direction:column;gap:calc(5px*var(--s));flex-shrink:0;}
.pitch-right{flex:1;display:flex;flex-direction:column;gap:calc(3px*var(--s));justify-content:center;padding-top:calc(4px*var(--s));}
.pitch-mph{font-family:'Bebas Neue',sans-serif;font-size:calc(44px*var(--s));
  letter-spacing:1px;color:#fff;line-height:1;}
.pitch-mph span{font-size:calc(13px*var(--s));color:#555;letter-spacing:2px;margin-left:calc(2px*var(--s));}
.pitch-call{
  display:inline-flex;align-items:center;padding:calc(3px*var(--s)) calc(9px*var(--s));
  border-radius:calc(20px*var(--s));font-family:'Montserrat',sans-serif;
  font-size:calc(10px*var(--s));font-weight:700;letter-spacing:1px;
  align-self:flex-start;
}
.pitch-call.strike{background:rgba(255,60,60,.18);color:#ff6060;border:1px solid rgba(255,60,60,.3);}
.pitch-call.ball{background:rgba(60,180,255,.14);color:#60c8ff;border:1px solid rgba(60,180,255,.25);}
.pitch-call.inplay{background:rgba(80,255,120,.14);color:#60ff90;border:1px solid rgba(80,255,120,.25);}
/* Result inside right column */
.pitch-result-event{font-family:'Bebas Neue',sans-serif;font-size:calc(24px*var(--s));
  letter-spacing:1px;line-height:1;}
.pitch-result-event.out{color:#ff6060;}
.pitch-result-event.safe{color:#60ff90;}
.pitch-result-event.neutral{color:#fff;}
.pitch-result-desc{font-family:'Montserrat',sans-serif;font-size:calc(9px*var(--s));
  color:#666;line-height:1.4;}
.swing-icon{font-size:calc(18px*var(--s));line-height:1;}

/* === MATCHUP === */
.matchup{display:flex;gap:calc(8px*var(--s));margin-bottom:calc(12px*var(--s));}
.mplayer{
  flex:1;display:flex;align-items:center;gap:calc(10px*var(--s));
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:calc(16px*var(--s));padding:calc(8px*var(--s)) calc(10px*var(--s));
}
.mphoto{
  width:calc(50px*var(--s));height:calc(50px*var(--s));border-radius:50%;
  object-fit:cover;object-position:top;
  border:2px solid rgba(255,255,255,.3);background:#111;flex-shrink:0;
}
.minfo{display:flex;flex-direction:column;min-width:0;}
.mlabel{font-family:'Montserrat',sans-serif;font-size:calc(8.5px*var(--s));
  font-weight:700;letter-spacing:1.5px;color:#666;text-transform:uppercase;}
.mname{font-family:'Montserrat',sans-serif;font-size:calc(12px*var(--s));
  font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mstat{font-family:'Montserrat',sans-serif;font-size:calc(9.5px*var(--s));color:#888;white-space:nowrap;}

/* === LINEUPS === */
.lineups{display:flex;gap:calc(8px*var(--s));margin-bottom:calc(12px*var(--s));}
.lineup-col{
  flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
  border-radius:calc(14px*var(--s));padding:calc(8px*var(--s)) calc(10px*var(--s));
}
.lineup-head{
  font-family:'Bebas Neue',sans-serif;font-size:calc(11px*var(--s));
  letter-spacing:1.5px;color:#777;margin-bottom:calc(5px*var(--s));
  display:flex;align-items:center;gap:calc(5px*var(--s));
}
.lineup-head img{width:calc(16px*var(--s));height:calc(16px*var(--s));object-fit:contain;}
.lineup-row{
  display:flex;align-items:center;gap:calc(5px*var(--s));
  padding:calc(2.5px*var(--s)) 0;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.lineup-row:last-child{border:none;}
.lineup-row.batting{background:rgba(255,255,255,.06);border-radius:calc(4px*var(--s));
  border-bottom:none;padding-left:calc(3px*var(--s));padding-right:calc(3px*var(--s));}
.ln{font-family:'Bebas Neue',sans-serif;font-size:calc(10px*var(--s));color:#444;
  min-width:calc(12px*var(--s));text-align:right;}
.lname{font-family:'Montserrat',sans-serif;font-size:calc(10px*var(--s));
  font-weight:600;color:#ccc;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lpos{font-family:'Bebas Neue',sans-serif;font-size:calc(10px*var(--s));color:#555;}
.lstat{font-family:'Montserrat',sans-serif;font-size:calc(8.5px*var(--s));color:#666;white-space:nowrap;}

/* === VENUE === */
.venue{
  display:flex;align-items:center;justify-content:center;gap:calc(6px*var(--s));
  font-family:'Montserrat',sans-serif;font-size:calc(10px*var(--s));
  letter-spacing:2px;text-transform:uppercase;color:#666;
}
.venue svg{width:calc(12px*var(--s));height:calc(12px*var(--s));fill:#666;flex-shrink:0;}
.wordmark{
  text-align:center;font-family:'Bebas Neue',sans-serif;
  font-size:calc(10px*var(--s));letter-spacing:3px;
  color:rgba(255,255,255,.18);margin-top:calc(6px*var(--s));
}

/* === SETUP PANEL === */
#setup{
  display:none;background:#080808;min-height:100vh;
  padding:40px 30px;color:#ccc;
}
#setup h2{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:#fff;margin-bottom:4px;}
#setup p.sub{font-size:11px;color:#555;letter-spacing:1px;margin-bottom:30px;}
.srow{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.srow label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#666;min-width:80px;}
.srow input[type=text],.srow input[type=date],.srow select{
  background:#111;border:1px solid #222;color:#fff;
  padding:10px 13px;border-radius:10px;font-family:'Montserrat',sans-serif;
  font-size:13px;outline:none;flex:1;min-width:200px;
}
.srow input[type=range]{flex:1;}
.srow button{
  background:#fff;color:#000;border:none;padding:10px 20px;
  border-radius:10px;font-family:'Montserrat',sans-serif;font-weight:700;
  font-size:12px;letter-spacing:1px;cursor:pointer;white-space:nowrap;
}
.srow button.sec{background:#161616;color:#999;border:1px solid #2a2a2a;}
hr.sdiv{border:none;border-top:1px solid #181818;margin:22px 0;}
#resultsBlock{display:none;}
.url-row{display:flex;gap:8px;margin-top:8px;}
.url-row input{flex:1;font-size:11px;color:#777;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:8px;padding:9px 11px;}
#previewMount{margin-top:22px;background:#111;border-radius:14px;padding:30px;display:flex;justify-content:center;}
</style>
</head>
<body>
<div id="root"></div>
<div id="setup">
  <h2>SportHaus · TikTok Live</h2>
  <p class="sub">Abre · elige el juego · copia la URL a OBS.</p>
  <div class="srow"><label>Fecha</label><input type="date" id="dateInput"><button id="loadGamesBtn">Cargar juegos</button></div>
  <div class="srow"><label>Juego</label><select id="gameSelect"><option value="">— carga primero —</option></select><button id="useGameBtn">Usar</button></div>
  <div class="srow"><label>GamePk</label><input type="text" id="manualPk" placeholder="ej. 716463"><button id="manualBtn" class="sec">Usar</button></div>
  <div class="srow"><label>Escala</label><input type="range" id="scaleInput" min="0.5" max="3" step="0.1" value="2"><span id="scaleReadout" style="font-size:13px;min-width:40px">2x</span></div>
  <input type="hidden" id="currentPk">
  <hr class="sdiv">
  <div id="resultsBlock">
    <p style="font-size:11px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">URL para OBS (Fuente de Navegador)</p>
    <div class="url-row"><input type="text" id="urlBox" readonly><button id="copyBtn">Copiar</button></div>
    <div id="previewMount"><div style="color:#333;font-size:12px">Vista previa aquí</div></div>
  </div>
</div>

// ─── strike zone SVG ───────────────────────────────────
function zoneHTML(pX, pZ, szTop, szBot, isStrike, inPlay){
  const SVG_W = 80, SVG_H = 100;
  const zoneLeft = 12, zoneRight = 68, zoneTop = 6, zoneBot = 72;
  const zoneW = zoneRight - zoneLeft, zoneH = zoneBot - zoneTop;
  const plateHalf = 0.83;
  const dotX = pX != null ? zoneLeft + (pX + plateHalf) / (2 * plateHalf) * zoneW : null;
  const dotY = (pZ != null && szTop && szBot)
    ? zoneTop + (1 - (pZ - szBot) / (szTop - szBot)) * zoneH
    : null;
  const dotColor = inPlay ? '#60ff90' : isStrike ? '#ff5050' : '#4ab8ff';
  const dotClamp = dotX != null ? Math.max(5, Math.min(SVG_W-5, dotX)) : null;
  const dotClampy = dotY != null ? Math.max(3, Math.min(SVG_H-15, dotY)) : null;
  const dot = (dotClamp != null && dotClampy != null)
    ? `<circle cx="${dotClamp.toFixed(1)}" cy="${dotClampy.toFixed(1)}" r="5.5" fill="${dotColor}" opacity=".95"/>
       <circle cx="${dotClamp.toFixed(1)}" cy="${dotClampy.toFixed(1)}" r="9" fill="${dotColor}" opacity=".18"/>`
    : '';
  return `<svg class="zone-svg" viewBox="0 0 ${SVG_W} ${SVG_H}" xmlns="http://www.w3.org/2000/svg">
    <!-- zone subtle fill -->
    <rect x="${zoneLeft}" y="${zoneTop}" width="${zoneW}" height="${zoneH}" fill="rgba(255,255,255,.04)" rx="2"/>
    <!-- thirds grid -->
    <line x1="${zoneLeft}" y1="${zoneTop+zoneH/3}" x2="${zoneRight}" y2="${zoneTop+zoneH/3}" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
    <line x1="${zoneLeft}" y1="${zoneTop+2*zoneH/3}" x2="${zoneRight}" y2="${zoneTop+2*zoneH/3}" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
    <line x1="${zoneLeft+zoneW/3}" y1="${zoneTop}" x2="${zoneLeft+zoneW/3}" y2="${zoneBot}" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
    <line x1="${zoneLeft+2*zoneW/3}" y1="${zoneTop}" x2="${zoneLeft+2*zoneW/3}" y2="${zoneBot}" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
    <!-- zone border -->
    <rect x="${zoneLeft}" y="${zoneTop}" width="${zoneW}" height="${zoneH}" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1.5" rx="2"/>
    <!-- pitch dot -->
    ${dot}
    <!-- plate -->
    <path d="M20,80 L60,80 L65,88 L40,92 L15,88 Z" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="1.2"/>
  </svg>`;
}

// ─── innings table ──────────────────────────────────────
function inningsHTML(ls, awayAbbr, homeAbbr){
  const innings = ls.innings || [];
  const cur = ls.currentInning || 0;
  const awayR = ls.teams ? (ls.teams.away.runs ?? 0) : 0;
  const awayH = ls.teams ? (ls.teams.away.hits ?? 0) : 0;
  const awayE = ls.teams ? (ls.teams.away.errors ?? 0) : 0;
  const homeR = ls.teams ? (ls.teams.home.runs ?? 0) : 0;
  const homeH = ls.teams ? (ls.teams.home.hits ?? 0) : 0;
  const homeE = ls.teams ? (ls.teams.home.errors ?? 0) : 0;

  // Show up to 9 innings (or current), min 3
  const total = Math.max(Math.min(Math.max(cur, 3), 9), innings.length);
  let inningCells = '', awayInning = '', homeInning = '';
  for(let i = 1; i <= total; i++){
    const cls = i === cur ? ' class="current-inn"' : '';
    inningCells += `<td${cls}>${i}</td>`;
    const inn = innings[i-1];
    const ar = inn ? (inn.away && inn.away.runs != null ? inn.away.runs : (i < cur ? '-' : '')) : (i < cur ? '-' : '');
    const hr = inn ? (inn.home && inn.home.runs != null ? inn.home.runs : (i < cur ? '-' : '')) : (i < cur ? '-' : '');
    awayInning += `<td>${ar}</td>`;
    homeInning += `<td>${hr}</td>`;
  }

  return `<div class="innings-wrap"><table class="innings-table">
    <tr>
      <td class="lbl"></td>${inningCells}
      <td class="sep che-lbl">R</td><td class="che-lbl">H</td><td class="che-lbl">E</td>
    </tr>
    <tr>
      <td class="lbl">${awayAbbr}</td>${awayInning}
      <td class="sep tot">${awayR}</td><td class="tot">${awayH}</td><td>${awayE}</td>
    </tr>
    <tr>
      <td class="lbl">${homeAbbr}</td>${homeInning}
      <td class="sep tot">${homeR}</td><td class="tot">${homeH}</td><td>${homeE}</td>
    </tr>
  </table></div>`;
}

// ─── lineup column ──────────────────────────────────────
function lineupColHTML(raw, side, teamId, abbr, currentBatterId){
  try{
    const players = raw.liveData.boxscore.teams[side].players || {};
    const batters = Object.values(players)
      .filter(p => p.battingOrder && parseInt(p.battingOrder) % 100 === 0)
      .sort((a,b) => parseInt(a.battingOrder) - parseInt(b.battingOrder))
      .slice(0, 9);
    if(!batters.length) return '';
    const rows = batters.map((p, i) => {
      const name = p.person ? p.person.fullName : '—';
      const lastName = name.split(' ').slice(-1)[0];
      const pos = (p.position && p.position.abbreviation) || '';
      const bs = p.stats && p.stats.batting;
      const stat = bs ? `${bs.hits??0}-${bs.atBats??0}` : '';
      const isBatting = currentBatterId && p.person && p.person.id === currentBatterId;
      return `<div class="lineup-row${isBatting?' batting':''}">
        <span class="ln">${i+1}</span>
        <span class="lname">${lastName}</span>
        <span class="lpos">${pos}</span>
        ${stat ? `<span class="lstat">${stat}</span>` : ''}
      </div>`;
    }).join('');
    const logoUrl = `${LOGO_BASE}${teamId}.svg`;
    return `<div class="lineup-col">
      <div class="lineup-head"><img src="${logoUrl}" onerror="this.style.display='none'">${abbr}</div>
      ${rows}
    </div>`;
  }catch(e){ return ''; }
}

// ─── matchup ────────────────────────────────────────────
function matchupHTML(raw, gd, ls){
  try{
    const offense = ls.offense || {}, defense = ls.defense || {};
    const batter = offense.batter, pitcher = defense.pitcher;
    if(!batter && !pitcher) return '';
    const offTeamId = offense.team ? offense.team.id : null;
    const half = (ls.inningHalf || ls.inningState || '').toLowerCase();
    const offSide = offTeamId
      ? (gd.teams.home.id === offTeamId ? 'home' : 'away')
      : (half.startsWith('top') ? 'away' : 'home');
    const defSide = offSide === 'home' ? 'away' : 'home';
    function getStat(side, id, type){
      try{
        const p = raw.liveData.boxscore.teams[side].players['ID'+id];
        return p && p.stats ? p.stats[type] : null;
      }catch(e){ return null; }
    }
    function getFullName(side, id, fallback){
      try{
        const p = raw.liveData.boxscore.teams[side].players['ID'+id];
        return (p && p.person && p.person.fullName) || fallback;
      }catch(e){ return fallback; }
    }
    const bName = batter ? getFullName(offSide, batter.id, batter.fullName||'—') : '—';
    const pName = pitcher ? getFullName(defSide, pitcher.id, pitcher.fullName||'—') : '—';
    const bStats = batter ? getStat(offSide, batter.id, 'batting') : null;
    const pStats = pitcher ? getStat(defSide, pitcher.id, 'pitching') : null;
    const bLine = bStats ? `${bStats.hits??0}-${bStats.atBats??0}${bStats.homeRuns?`, ${bStats.homeRuns} HR`:''}${bStats.rbi?`, ${bStats.rbi} RBI`:''}` : '';
    const pLine = pStats ? `${pStats.inningsPitched??'0.0'} IP · ${pStats.earnedRuns??0} ER · ${pStats.strikeOuts??0} K` : '';
    return `<div class="matchup">
      <div class="mplayer">${playerPhoto(batter&&batter.id)}<div class="minfo">
        <div class="mlabel">Al bate</div>
        <div class="mname">${bName}</div>
        ${bLine?`<div class="mstat">${bLine}</div>`:''}
      </div></div>
      <div class="mplayer">${playerPhoto(pitcher&&pitcher.id)}<div class="minfo">
        <div class="mlabel">Lanza</div>
        <div class="mname">${pName}</div>
        ${pLine?`<div class="mstat">${pLine}</div>`:''}
      </div></div>
    </div>`;
  }catch(e){ return ''; }
}

// ─── bases SVG ──────────────────────────────────────────
function basesHTML(off){
  const f=(off&&off.first)?1:0, s=(off&&off.second)?1:0, t=(off&&off.third)?1:0;
  const on='#f4f0e8', dim='rgba(255,255,255,.14)';
  return `<svg class="bases-svg" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
    <rect x="14" y="2"  width="12" height="12" rx="1.5" transform="rotate(45 20 8)"  fill="${s?on:dim}"/>
    <rect x="2"  y="14" width="12" height="12" rx="1.5" transform="rotate(45 8 20)"  fill="${t?on:dim}"/>
    <rect x="26" y="14" width="12" height="12" rx="1.5" transform="rotate(45 32 20)" fill="${f?on:dim}"/>
  </svg>`;
}

// ─── MAIN RENDER ────────────────────────────────────────
function render(raw){
  const gd = raw.gameData, ld = raw.liveData;
  const away = gd.teams.away, home = gd.teams.home;
  const abs = gd.status.abstractGameState;
  const det = (gd.status.detailedState || '').toLowerCase();
  const venue = gd.venue ? gd.venue.name : '';
  const awayAbbr = away.abbreviation || away.teamName;
  const homeAbbr = home.abbreviation || home.teamName;

  // ── head text
  let headHTML = '';
  if(abs === 'Preview'){
    try{
      const dt = new Date(gd.datetime.dateTime);
      headHTML = `${dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · PRE-JUEGO`;
    }catch(e){ headHTML = 'PRE-JUEGO'; }
  } else if(abs === 'Final'){
    headHTML = 'FINAL';
  } else if(det.includes('suspend')){
    headHTML = 'SUSPENDIDO';
  } else if(det.includes('delay')||det.includes('postpone')){
    headHTML = 'DEMORADO';
  } else {
    const ls = ld.linescore;
    const half = (ls.inningHalf||ls.inningState||'').toLowerCase();
    const halfEs = half.startsWith('top') ? 'ALTA' : half.startsWith('bot') ? 'BAJA' : '';
    headHTML = `<span class="live-dot"></span>EN VIVO · ${halfEs} ${ls.currentInning??''}`;
  }

  let awayRuns = 0, homeRuns = 0;
  let stateHTML = '', innHTML = '', pitchAreaHTML = '', resultHTML = '', matchHTML = '', lineupHTML = '';

  if(abs !== 'Preview'){
    const ls = ld.linescore;
    awayRuns = ls.teams ? (ls.teams.away.runs ?? 0) : 0;
    homeRuns = ls.teams ? (ls.teams.home.runs ?? 0) : 0;

    // ── state row
    if(abs !== 'Final'){
      const off = ls.offense || {};
      const outs = [0,1,2].map(i=>`<span class="out-dot${i<(ls.outs||0)?' on':''}"></span>`).join('');
      stateHTML = `<div class="state-row">
        <div class="outs-block">${outs}<span class="state-label">OUTS</span></div>
        ${basesHTML(off)}
        <div class="count-badge">${ls.balls??0}-${ls.strikes??0}</div>
      </div>`;
    }

    // ── innings + CHE
    innHTML = inningsHTML(ls, awayAbbr, homeAbbr);

    // ── last pitch (live only)
    if(abs !== 'Final'){
      try{
        const cp = ld.plays && ld.plays.currentPlay;
        const events = (cp && cp.playEvents) || [];
        const pitches = events.filter(e => e.type === 'pitch');
        const lp = pitches[pitches.length - 1];
        if(lp){
          const pitchDesc = lp.details && lp.details.type && lp.details.type.description;
          const mph = lp.pitchData && lp.pitchData.startSpeed;
          const call = (lp.details && lp.details.call && lp.details.call.description) || '';
          const isStrike = call.toLowerCase().includes('strike') || call === 'Called Strike';
          const inPlay = call.toLowerCase().includes('in play');
          const pX = lp.pitchData && lp.pitchData.coordinates && lp.pitchData.coordinates.pX;
          const pZ = lp.pitchData && lp.pitchData.coordinates && lp.pitchData.coordinates.pZ;
          const szTop = (lp.pitchData && lp.pitchData.strikeZoneTop) || 3.5;
          const szBot = (lp.pitchData && lp.pitchData.strikeZoneBottom) || 1.5;
          const callClass = inPlay ? 'inplay' : isStrike ? 'strike' : 'ball';
          const callText = inPlay ? 'EN JUEGO' : isStrike ? 'STRIKE' : 'BOLA';

          // Result block (merged inside pitch panel)
          let resultInPanel = '';
          try{
            const cp = ld.plays && ld.plays.currentPlay;
            if(cp && cp.result && cp.result.event && cp.about && cp.about.isComplete){
              const ev = cp.result.event;
              const desc = cp.result.description || '';
              const evES = resultEventES(ev);
              // Determine color class
              const isOut = ['Strikeout','Groundout','Flyout','Pop Out','Lineout','Forceout','Double Play','Triple Play','Fielders Choice Out','Sac Fly','Sac Bunt'].includes(ev);
              const isSafe = ['Single','Double','Triple','Home Run','Walk','Hit By Pitch','Intent Walk'].includes(ev);
              const colorCls = isOut ? 'out' : isSafe ? 'safe' : 'neutral';
              // Swing icon for strikeout swinging
              const isSwing = ev === 'Strikeout' && (desc.toLowerCase().includes('swinging') || call.toLowerCase().includes('swing'));
              const icon = isSwing ? `<span class="swing-icon">🔴⚾</span> ` : '';
              resultInPanel = `<div class="pitch-result-event ${colorCls}">${icon}${evES}</div>
                ${desc ? `<div class="pitch-result-desc">${resultDescES(desc)}</div>` : ''}`;
            }
          }catch(e){}

          pitchAreaHTML = `<div class="pitch-area">
            <div class="zone-wrap">
              <div class="zone-label">ZONA</div>
              ${zoneHTML(pX, pZ, szTop, szBot, isStrike, inPlay)}
            </div>
            <div class="pitch-info">
              <div class="pitch-type">${pitchTypeES(pitchDesc)}</div>
              <div class="pitch-row">
                <div class="pitch-left">
                  ${mph ? `<div class="pitch-mph">${Math.round(mph)}<span>MPH</span></div>` : ''}
                  <div class="pitch-call ${callClass}">${callText}</div>
                </div>
                ${resultInPanel ? `<div class="pitch-right">${resultInPanel}</div>` : ''}
              </div>
            </div>
          </div>`;
        }
      }catch(e){}

    }

    // ── matchup
    if(abs !== 'Final') matchHTML = matchupHTML(raw, gd, ls);

    // ── lineups
    try{
      const batterId = ld.linescore && ld.linescore.offense && ld.linescore.offense.batter && ld.linescore.offense.batter.id;
      const awCol = lineupColHTML(raw, 'away', away.id, awayAbbr, batterId);
      const hmCol = lineupColHTML(raw, 'home', home.id, homeAbbr, batterId);
      if(awCol && hmCol) lineupHTML = `<div class="lineups">${awCol}${hmCol}</div>`;
    }catch(e){}
  }

  return `<div class="card-wrap">
    <div class="sh-medallion"><img src="${SH_LOGO}"></div>
    <div class="card">
      <div class="ambient"></div>
      <div class="head">${headHTML}</div>
      <div class="score-area">
        <div class="team-side">${logoImg(away.id)}<div class="team-abbr">${awayAbbr}</div></div>
        <div class="score-block">
          <div class="score-num">${awayRuns}</div>
          <div class="score-dash">—</div>
          <div class="score-num">${homeRuns}</div>
        </div>
        <div class="team-side home"><div class="team-abbr">${homeAbbr}</div>${logoImg(home.id)}</div>
      </div>
      ${stateHTML}
      ${innHTML}
      ${pitchAreaHTML}
      ${matchHTML}
      ${lineupHTML}
      ${venue?`<div class="venue"><svg viewBox="0 0 24 24"><path d="M12 2L4 7v2h16V7l-8-5zM6 11v7H4v2h16v-2h-2v-7h-2v7h-3v-7h-2v7H8v-7H6z"/></svg>${venue}</div>`:''}
    </div>
  </div>`;
}

// ─── INIT ────────────────────────────────────────────────
if(urlScale) applyScale(urlScale);

if(urlGamePk){
  // EMBED MODE
  async function tick(){
    try{
      const res = await fetch(`${STATSAPI}/api/v1.1/game/${urlGamePk}/feed/live`);
      const raw = await res.json();
      document.getElementById('root').innerHTML = render(raw);
    }catch(e){
      if(!document.querySelector('.card-wrap'))
        document.getElementById('root').innerHTML = '<div style="color:#444;font-size:13px;padding:20px">Cargando...</div>';
    }
  }
  tick();
  setInterval(tick, 8000);
} else {
  // SETUP MODE
  document.getElementById('root').style.display = 'none';
  document.getElementById('setup').style.display = 'block';
  const dateInput = document.getElementById('dateInput');
  dateInput.value = localDateStr();
  const scaleInput = document.getElementById('scaleInput');
  applyScale(scaleInput.value);

  document.getElementById('loadGamesBtn').addEventListener('click', async () => {
    const sel = document.getElementById('gameSelect');
    sel.innerHTML = '<option>Cargando…</option>';
    try{
      const res = await fetch(`${STATSAPI}/api/v1/schedule?sportId=1&date=${dateInput.value}`);
      const data = await res.json();
      const games = (data.dates&&data.dates[0]&&data.dates[0].games)||[];
      if(!games.length){ sel.innerHTML = '<option value="">Sin juegos esa fecha</option>'; return; }
      sel.innerHTML = '';
      games.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g.gamePk;
        const t = new Date(g.gameDate).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        opt.textContent = `${g.teams.away.team.name} @ ${g.teams.home.team.name} — ${t}`;
        sel.appendChild(opt);
      });
    }catch(e){ sel.innerHTML = '<option>Error al cargar</option>'; }
  });

  scaleInput.addEventListener('input', () => {
    applyScale(scaleInput.value);
    document.getElementById('scaleReadout').textContent = scaleInput.value + 'x';
    syncUrl();
  });

  function syncUrl(){
    const pk = document.getElementById('currentPk').value;
    if(!pk) return;
    const u = new URL(location.href); u.search='';
    u.searchParams.set('gamePk', pk);
    u.searchParams.set('scale', scaleInput.value);
    document.getElementById('urlBox').value = u.toString();
  }

  let previewTimer = null;
  function activateGame(pk){
    if(!pk) return;
    document.getElementById('currentPk').value = pk;
    document.getElementById('resultsBlock').style.display = 'block';
    syncUrl();
    if(previewTimer) clearInterval(previewTimer);
    const mount = document.getElementById('previewMount');
    async function tick(){
      try{
        const res = await fetch(`${STATSAPI}/api/v1.1/game/${pk}/feed/live`);
        const raw = await res.json();
        mount.innerHTML = render(raw);
      }catch(e){ mount.innerHTML = '<div style="color:#333;font-size:12px;padding:20px">Error cargando el juego</div>'; }
    }
    tick();
    previewTimer = setInterval(tick, 8000);
    try{ localStorage.setItem('sh_live_pk', pk); }catch(e){}
  }

  document.getElementById('useGameBtn').addEventListener('click', () => activateGame(document.getElementById('gameSelect').value));
  document.getElementById('manualBtn').addEventListener('click', () => activateGame(document.getElementById('manualPk').value.trim()));
  document.getElementById('copyBtn').addEventListener('click', () => {
    const inp = document.getElementById('urlBox'); inp.select();
    try{ navigator.clipboard.writeText(inp.value); }catch(e){ document.execCommand('copy'); }
  });
  try{ const last=localStorage.getItem('sh_live_pk'); if(last) document.getElementById('manualPk').value=last; }catch(e){}
}
</script>
</body>
</html>
