<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SportHaus Dual</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--s:1;}
html,body{background:transparent;overflow:hidden;font-family:'Montserrat',sans-serif;}

.dual-wrap{
  position:relative;
  width:calc(540px*var(--s));
  padding-top:calc(38px*var(--s));
}
.sh-medallion{
  position:absolute;top:calc(2px*var(--s));left:50%;transform:translateX(-50%);z-index:10;
  width:calc(56px*var(--s));height:calc(56px*var(--s));border-radius:50%;
  background:#080808;border:2px solid rgba(255,255,255,.8);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  box-shadow:0 0 calc(18px*var(--s)) rgba(255,255,255,.28);
}
.sh-medallion img{width:82%;height:82%;object-fit:contain;}

.dual-card{
  width:100%;
  background:radial-gradient(circle at 50% -15%,#1c1c1c,#060606 65%);
  border:1px solid rgba(255,255,255,.16);
  border-radius:calc(26px*var(--s));
  padding:calc(18px*var(--s)) calc(18px*var(--s)) calc(16px*var(--s));
  box-shadow:0 0 calc(50px*var(--s)) rgba(0,0,0,.8);
  overflow:hidden;
  position:relative;
}
.dual-card::after{
  content:'';position:absolute;left:8%;right:8%;top:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
}
.ambient{
  position:absolute;bottom:0;left:0;right:0;height:calc(80px*var(--s));
  background:radial-gradient(ellipse at 50% 140%,rgba(60,100,50,.18),transparent 70%);
  pointer-events:none;
}

/* handles */
.handles-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:calc(10px*var(--s));padding:0 calc(4px*var(--s));
}
.handle{font-family:'Montserrat',sans-serif;font-weight:700;
  font-size:calc(11px*var(--s));letter-spacing:.5px;color:#888;
  display:flex;align-items:center;gap:calc(4px*var(--s));}
.handle.main{color:#ccc;}
.handle svg{width:calc(11px*var(--s));height:calc(11px*var(--s));fill:currentColor;flex-shrink:0;}

/* divider between games */
.game-divider{
  border:none;border-top:1px solid rgba(255,255,255,.12);
  margin:calc(14px*var(--s)) 0;position:relative;
}
.game-divider::before{
  content:'VS';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Bebas Neue',sans-serif;font-size:calc(11px*var(--s));letter-spacing:2px;
  color:#333;background:#0a0a0a;padding:0 calc(8px*var(--s));
}

/* head */
.head{display:flex;align-items:center;justify-content:center;gap:calc(7px*var(--s));
  font-family:'Bebas Neue',sans-serif;font-size:calc(14px*var(--s));
  letter-spacing:calc(2px*var(--s));color:#bbb;margin-bottom:calc(10px*var(--s));}
.live-dot{width:calc(8px*var(--s));height:calc(8px*var(--s));border-radius:50%;
  background:#ff3c3c;flex-shrink:0;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.1;}}

/* score */
.score-area{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:calc(10px*var(--s));}
.team-side{display:flex;align-items:center;gap:calc(8px*var(--s));}
.team-side.home{flex-direction:row-reverse;}
.team-logo{width:calc(46px*var(--s));height:calc(46px*var(--s));object-fit:contain;
  filter:drop-shadow(0 calc(2px*var(--s)) calc(8px*var(--s)) rgba(0,0,0,.5));}
.team-abbr{font-family:'Bebas Neue',sans-serif;font-size:calc(22px*var(--s));letter-spacing:1px;color:#eee;}
.score-block{display:flex;align-items:center;gap:calc(8px*var(--s));}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:calc(56px*var(--s));line-height:1;color:#fff;}
.score-dash{font-family:'Bebas Neue',sans-serif;font-size:calc(28px*var(--s));color:#444;line-height:1;}

/* state */
.state-row{display:flex;align-items:center;justify-content:center;gap:calc(14px*var(--s));
  margin-bottom:calc(10px*var(--s));}
.outs-block{display:flex;align-items:center;gap:calc(4px*var(--s));}
.out-dot{width:calc(10px*var(--s));height:calc(10px*var(--s));border-radius:50%;
  border:1.5px solid rgba(255,255,255,.35);background:transparent;}
.out-dot.on{background:#f4f0e8;border-color:#f4f0e8;}
.state-label{font-family:'Bebas Neue',sans-serif;font-size:calc(9px*var(--s));
  letter-spacing:1px;color:#555;margin-left:calc(2px*var(--s));}
.bases-svg{width:calc(32px*var(--s));height:calc(32px*var(--s));}
.count-badge{font-family:'Bebas Neue',sans-serif;font-size:calc(18px*var(--s));color:#ddd;letter-spacing:1px;}

/* innings */
.innings-wrap{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
  border-radius:calc(12px*var(--s));padding:calc(7px*var(--s)) calc(9px*var(--s));
  margin-bottom:calc(10px*var(--s));}
.innings-table{width:100%;border-collapse:collapse;
  font-family:'Bebas Neue',sans-serif;font-size:calc(11px*var(--s));letter-spacing:.5px;color:#aaa;}
.innings-table td{padding:calc(2.5px*var(--s)) calc(3px*var(--s));text-align:center;white-space:nowrap;}
.innings-table .lbl{text-align:left;color:#666;font-size:calc(10px*var(--s));padding-right:calc(5px*var(--s));}
.innings-table .sep{border-left:1px solid rgba(255,255,255,.12);color:#555;}
.innings-table .che-lbl{color:#555;font-size:calc(9px*var(--s));}
.innings-table .tot{color:#fff;font-size:calc(12px*var(--s));}
.innings-table .current-inn{color:#fff;}

/* pitch */
.pitch-area{display:flex;align-items:stretch;gap:calc(8px*var(--s));
  margin-bottom:calc(10px*var(--s));}
.zone-wrap{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:calc(12px*var(--s));padding:calc(8px*var(--s)) calc(10px*var(--s));
  display:flex;flex-direction:column;align-items:center;gap:calc(4px*var(--s));flex-shrink:0;}
.zone-label{font-family:'Bebas Neue',sans-serif;font-size:calc(8px*var(--s));letter-spacing:2px;color:#555;}
.zone-svg{width:calc(64px*var(--s));height:calc(80px*var(--s));}
.pitch-info{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:calc(12px*var(--s));padding:calc(8px*var(--s)) calc(12px*var(--s));
  display:flex;flex-direction:column;gap:calc(6px*var(--s));}
.pitch-type{font-family:'Bebas Neue',sans-serif;font-size:calc(13px*var(--s));letter-spacing:1px;color:#999;}
.pitch-row{display:flex;align-items:flex-start;gap:calc(8px*var(--s));}
.pitch-left{display:flex;flex-direction:column;gap:calc(4px*var(--s));flex-shrink:0;}
.pitch-right{flex:1;display:flex;flex-direction:column;gap:calc(2px*var(--s));padding-top:calc(3px*var(--s));}
.pitch-mph{font-family:'Bebas Neue',sans-serif;font-size:calc(36px*var(--s));letter-spacing:1px;color:#fff;line-height:1;}
.pitch-mph span{font-size:calc(11px*var(--s));color:#555;letter-spacing:2px;margin-left:calc(2px*var(--s));}
.pitch-call{display:inline-flex;align-items:center;padding:calc(3px*var(--s)) calc(8px*var(--s));
  border-radius:calc(20px*var(--s));font-family:'Montserrat',sans-serif;
  font-size:calc(9px*var(--s));font-weight:700;letter-spacing:1px;align-self:flex-start;}
.pitch-call.strike{background:rgba(255,60,60,.18);color:#ff6060;border:1px solid rgba(255,60,60,.3);}
.pitch-call.ball{background:rgba(60,180,255,.14);color:#60c8ff;border:1px solid rgba(60,180,255,.25);}
.pitch-call.inplay{background:rgba(80,255,120,.14);color:#60ff90;border:1px solid rgba(80,255,120,.25);}
.pitch-result-event{font-family:'Bebas Neue',sans-serif;font-size:calc(20px*var(--s));letter-spacing:1px;line-height:1;}
.pitch-result-event.out{color:#ff6060;}
.pitch-result-event.safe{color:#60ff90;}
.pitch-result-event.neutral{color:#fff;}
.pitch-result-desc{font-family:'Montserrat',sans-serif;font-size:calc(8px*var(--s));color:#666;line-height:1.4;}
.swing-icon{font-size:calc(15px*var(--s));line-height:1;}

/* matchup */
.matchup{display:flex;gap:calc(7px*var(--s));margin-bottom:calc(10px*var(--s));}
.mplayer{flex:1;display:flex;align-items:center;gap:calc(8px*var(--s));
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:calc(12px*var(--s));padding:calc(7px*var(--s)) calc(9px*var(--s));}
.mphoto{width:calc(44px*var(--s));height:calc(44px*var(--s));border-radius:50%;
  object-fit:cover;object-position:top;border:2px solid rgba(255,255,255,.3);
  background:#111;flex-shrink:0;}
.minfo{display:flex;flex-direction:column;min-width:0;}
.mlabel{font-family:'Montserrat',sans-serif;font-size:calc(7.5px*var(--s));
  font-weight:700;letter-spacing:1.5px;color:#666;text-transform:uppercase;}
.mname{font-family:'Montserrat',sans-serif;font-size:calc(11px*var(--s));
  font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mstat{font-family:'Montserrat',sans-serif;font-size:calc(9px*var(--s));color:#888;white-space:nowrap;}

/* venue */
.venue{display:flex;align-items:center;justify-content:center;gap:calc(5px*var(--s));
  font-family:'Montserrat',sans-serif;font-size:calc(9px*var(--s));
  letter-spacing:2px;text-transform:uppercase;color:#555;}
.venue svg{width:calc(10px*var(--s));height:calc(10px*var(--s));fill:#555;flex-shrink:0;}

/* SETUP */
#setup{display:none;background:#080808;min-height:100vh;padding:40px 30px;color:#ccc;}
#setup h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#fff;margin-bottom:4px;}
#setup p.sub{font-size:11px;color:#555;letter-spacing:1px;margin-bottom:24px;}
.srow{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.srow label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#666;min-width:80px;}
.srow input[type=text],.srow input[type=date],.srow select{
  background:#111;border:1px solid #222;color:#fff;padding:9px 12px;
  border-radius:8px;font-family:'Montserrat',sans-serif;font-size:13px;outline:none;flex:1;min-width:180px;}
.srow input[type=range]{flex:1;}
.srow button{background:#fff;color:#000;border:none;padding:9px 18px;
  border-radius:8px;font-family:'Montserrat',sans-serif;font-weight:700;
  font-size:12px;letter-spacing:1px;cursor:pointer;white-space:nowrap;}
.srow button.sec{background:#161616;color:#999;border:1px solid #2a2a2a;}
hr.sdiv{border:none;border-top:1px solid #181818;margin:18px 0;}
#resultsBlock{display:none;}
.url-row{display:flex;gap:8px;margin-top:8px;}
.url-row input{flex:1;font-size:11px;color:#777;background:#0d0d0d;border:1px solid #1e1e1e;border-radius:8px;padding:8px 10px;}
#previewMount{margin-top:18px;background:#111;border-radius:12px;padding:24px;display:flex;justify-content:center;}
</style>
</head>
<body>
<div id="root"></div>
<div id="setup">
  <h2>SportHaus · Dual TikTok</h2>
  <p class="sub">Dos juegos en un solo hub. Abre · elige los juegos · copia la URL a OBS.</p>
  <div class="srow"><label>Fecha</label><input type="date" id="dateInput"><button id="loadGamesBtn">Cargar juegos</button></div>
  <div class="srow"><label>Juego 1</label><select id="game1Select"><option value="">— carga primero —</option></select></div>
  <div class="srow"><label>Juego 2</label><select id="game2Select"><option value="">— carga primero —</option></select></div>
  <div class="srow"><label>Escala</label><input type="range" id="scaleInput" min="0.5" max="3" step="0.1" value="1.8"><span id="scaleReadout" style="font-size:13px;min-width:40px">1.8x</span></div>
  <div class="srow"><button id="useGamesBtn">Usar estos dos juegos</button><button id="manualBtn" class="sec">GamePks manuales</button></div>
  <div id="manualRow" style="display:none" class="srow">
    <label>PK1</label><input type="text" id="pk1" placeholder="ej. 716463">
    <label>PK2</label><input type="text" id="pk2" placeholder="ej. 716464">
  </div>
  <hr class="sdiv">
  <div id="resultsBlock">
    <p style="font-size:11px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">URL para OBS / TikTok</p>
    <div class="url-row"><input type="text" id="urlBox" readonly><button id="copyBtn">Copiar</button></div>
    <div id="previewMount"><div style="color:#333;font-size:12px">Vista previa aquí</div></div>
  </div>
</div>

function zoneHTML(pX, pZ, szTop, szBot, isStrike, inPlay, isFoul){
  const SVG_W=64, SVG_H=80, zL=10, zR=54, zT=6, zB=58;
  const zW=zR-zL, zH=zB-zT, pH=0.83;
  const dotX = pX!=null ? zL+(pX+pH)/(2*pH)*zW : null;
  const dotY = (pZ!=null&&szTop&&szBot) ? zT+(1-(pZ-szBot)/(szTop-szBot))*zH : null;
  const dotColor = inPlay?'#60ff90':isFoul?'#FFD700':isStrike?'#ff5050':'#4ab8ff';
  const dX = dotX!=null?Math.max(4,Math.min(SVG_W-4,dotX)):null;
  const dY = dotY!=null?Math.max(3,Math.min(SVG_H-12,dotY)):null;
  const dot = (dX!=null&&dY!=null)
    ? `<circle cx="${dX.toFixed(1)}" cy="${dY.toFixed(1)}" r="4.5" fill="${dotColor}" opacity=".95"/>
       <circle cx="${dX.toFixed(1)}" cy="${dY.toFixed(1)}" r="8" fill="${dotColor}" opacity=".18"/>`
    : '';
  return `<svg class="zone-svg" viewBox="0 0 ${SVG_W} ${SVG_H}" xmlns="http://www.w3.org/2000/svg">
    <rect x="${zL}" y="${zT}" width="${zW}" height="${zH}" fill="rgba(255,255,255,.04)" rx="2"/>
    <line x1="${zL}" y1="${zT+zH/3}" x2="${zR}" y2="${zT+zH/3}" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
    <line x1="${zL}" y1="${zT+2*zH/3}" x2="${zR}" y2="${zT+2*zH/3}" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
    <line x1="${zL+zW/3}" y1="${zT}" x2="${zL+zW/3}" y2="${zB}" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
    <line x1="${zL+2*zW/3}" y1="${zT}" x2="${zL+2*zW/3}" y2="${zB}" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
    <rect x="${zL}" y="${zT}" width="${zW}" height="${zH}" fill="none" stroke="rgba(255,255,255,.38)" stroke-width="1.2" rx="2"/>
    ${dot}
    <path d="M16,64 L48,64 L52,70 L32,74 L12,70 Z" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="1"/>
  </svg>`;
}

function inningsHTML(ls, awayAbbr, homeAbbr){
  const innings=ls.innings||[], cur=ls.currentInning||0;
  const awayR=ls.teams?(ls.teams.away.runs??0):0, awayH=ls.teams?(ls.teams.away.hits??0):0, awayE=ls.teams?(ls.teams.away.errors??0):0;
  const homeR=ls.teams?(ls.teams.home.runs??0):0, homeH=ls.teams?(ls.teams.home.hits??0):0, homeE=ls.teams?(ls.teams.home.errors??0):0;
  const total=Math.max(Math.min(Math.max(cur,3),9),innings.length);
  let inningCells='', awayRow='', homeRow='';
  for(let i=1;i<=total;i++){
    const cls=i===cur?' class="current-inn"':'';
    inningCells+=`<td${cls}>${i}</td>`;
    const inn=innings[i-1];
    const ar=inn?(inn.away&&inn.away.runs!=null?inn.away.runs:(i<cur?'-':'')):( i<cur?'-':'');
    const hr=inn?(inn.home&&inn.home.runs!=null?inn.home.runs:(i<cur?'-':'')):( i<cur?'-':'');
    awayRow+=`<td>${ar}</td>`; homeRow+=`<td>${hr}</td>`;
  }
  return `<div class="innings-wrap"><table class="innings-table">
    <tr><td class="lbl"></td>${inningCells}<td class="sep che-lbl">R</td><td class="che-lbl">H</td><td class="che-lbl">E</td></tr>
    <tr><td class="lbl">${awayAbbr}</td>${awayRow}<td class="sep tot">${awayR}</td><td class="tot">${awayH}</td><td>${awayE}</td></tr>
    <tr><td class="lbl">${homeAbbr}</td>${homeRow}<td class="sep tot">${homeR}</td><td class="tot">${homeH}</td><td>${homeE}</td></tr>
  </table></div>`;
}

function matchupHTML(raw, gd, ls){
  try{
    const off=ls.offense||{}, def=ls.defense||{};
    const batter=off.batter, pitcher=def.pitcher;
    if(!batter&&!pitcher) return '';
    const half=(ls.inningHalf||ls.inningState||'').toLowerCase();
    const offTeamId=off.team?off.team.id:null;
    const offSide=offTeamId?(gd.teams.home.id===offTeamId?'home':'away'):(half.startsWith('top')?'away':'home');
    const defSide=offSide==='home'?'away':'home';
    function getStat(side,id,type){
      try{ const p=raw.liveData.boxscore.teams[side].players['ID'+id]; return p&&p.stats?p.stats[type]:null; }catch(e){return null;}
    }
    function getName(side,id,fb){
      try{ const p=raw.liveData.boxscore.teams[side].players['ID'+id]; return(p&&p.person&&p.person.fullName)||fb; }catch(e){return fb;}
    }
    const bName=batter?getName(offSide,batter.id,batter.fullName||'—'):'—';
    const pName=pitcher?getName(defSide,pitcher.id,pitcher.fullName||'—'):'—';
    const bStats=batter?getStat(offSide,batter.id,'batting'):null;
    const pStats=pitcher?getStat(defSide,pitcher.id,'pitching'):null;
    const bLine=bStats?`${bStats.hits??0}-${bStats.atBats??0}${bStats.homeRuns?`, ${bStats.homeRuns} HR`:''}${bStats.rbi?`, ${bStats.rbi} RBI`:''}`:'' ;
    const pLine=pStats?`${pStats.inningsPitched??'0.0'} IP · ${pStats.earnedRuns??0} ER · ${pStats.strikeOuts??0} K`:'';
    return `<div class="matchup">
      <div class="mplayer">${playerPhoto(batter&&batter.id)}<div class="minfo">
        <div class="mlabel">Al bate</div><div class="mname">${bName}</div>
        ${bLine?`<div class="mstat">${bLine}</div>`:''}
      </div></div>
      <div class="mplayer">${playerPhoto(pitcher&&pitcher.id)}<div class="minfo">
        <div class="mlabel">Lanza</div><div class="mname">${pName}</div>
        ${pLine?`<div class="mstat">${pLine}</div>`:''}
      </div></div>
    </div>`;
  }catch(e){return '';}
}

function renderGame(raw){
  const gd=raw.gameData, ld=raw.liveData;
  const away=gd.teams.away, home=gd.teams.home;
  const abs=gd.status.abstractGameState;
  const det=(gd.status.detailedState||'').toLowerCase();
  const venue=gd.venue?gd.venue.name:'';
  const awayAbbr=away.abbreviation||away.teamName;
  const homeAbbr=home.abbreviation||home.teamName;

  let headHTML='', awayRuns=0, homeRuns=0, stateHTML='', innHTML='', pitchHTML='', matchHTML='';

  if(abs==='Preview'){
    try{const dt=new Date(gd.datetime.dateTime); headHTML=`${dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · PRE-JUEGO`;}catch(e){headHTML='PRE-JUEGO';}
  }else if(abs==='Final'){ headHTML='FINAL';
  }else if(det.includes('suspend')){ headHTML='SUSPENDIDO';
  }else if(det.includes('delay')||det.includes('postpone')){ headHTML='DEMORADO';
  }else{
    const ls=ld.linescore;
    const half=(ls.inningHalf||ls.inningState||'').toLowerCase();
    const halfEs=half.startsWith('top')?'ALTA':half.startsWith('bot')?'BAJA':'';
    headHTML=`<span class="live-dot"></span>EN VIVO · ${halfEs} ${ls.currentInning??''}`;
  }

  if(abs!=='Preview'){
    const ls=ld.linescore;
    awayRuns=ls.teams?(ls.teams.away.runs??0):0;
    homeRuns=ls.teams?(ls.teams.home.runs??0):0;
    if(abs!=='Final'){
      const off=ls.offense||{};
      const outs=[0,1,2].map(i=>`<span class="out-dot${i<(ls.outs||0)?' on':''}"></span>`).join('');
      stateHTML=`<div class="state-row">
        <div class="outs-block">${outs}<span class="state-label">OUTS</span></div>
        ${basesHTML(off)}
        <div class="count-badge">${ls.balls??0}-${ls.strikes??0}</div>
      </div>`;
    }
    innHTML=inningsHTML(ls,awayAbbr,homeAbbr);

    if(abs!=='Final'){
      try{
        const cp=ld.plays&&ld.plays.currentPlay;
        const pitches=(cp&&cp.playEvents||[]).filter(e=>e.type==='pitch');
        const lp=pitches[pitches.length-1];
        if(lp){
          const pitchDesc=lp.details&&lp.details.type&&lp.details.type.description;
          const mph=lp.pitchData&&lp.pitchData.startSpeed;
          const call=(lp.details&&lp.details.call&&lp.details.call.description)||'';
          const isFoul=call.toLowerCase().includes('foul');
          const isStrike=!isFoul&&(call.toLowerCase().includes('strike')||call==='Called Strike');
          const inPlay=call.toLowerCase().includes('in play');
          const pX=lp.pitchData&&lp.pitchData.coordinates&&lp.pitchData.coordinates.pX;
          const pZ=lp.pitchData&&lp.pitchData.coordinates&&lp.pitchData.coordinates.pZ;
          const szTop=(lp.pitchData&&lp.pitchData.strikeZoneTop)||3.5;
          const szBot=(lp.pitchData&&lp.pitchData.strikeZoneBottom)||1.5;
          const callClass=isFoul?'strike':inPlay?'inplay':isStrike?'strike':'ball';
          const callText=isFoul?'FOUL':inPlay?'EN JUEGO':isStrike?'STRIKE':'BOLA';
          let resultInPanel='';
          try{
            if(cp&&cp.result&&cp.result.event&&cp.about&&cp.about.isComplete){
              const ev=cp.result.event, desc=cp.result.description||'';
              const evES=resultEventES(ev);
              const isOut=['Strikeout','Groundout','Flyout','Pop Out','Lineout','Forceout','Double Play','Triple Play','Fielders Choice Out','Sac Fly','Sac Bunt'].includes(ev);
              const isSafe=['Single','Double','Triple','Home Run','Walk','Hit By Pitch','Intent Walk'].includes(ev);
              const colorCls=isOut?'out':isSafe?'safe':'neutral';
              const isSwing=ev==='Strikeout'&&(desc.toLowerCase().includes('swinging')||call.toLowerCase().includes('swing'));
              const icon=isSwing?`<span class="swing-icon">🔴⚾</span> `:'';
              resultInPanel=`<div class="pitch-result-event ${colorCls}">${icon}${evES}</div>
                ${desc?`<div class="pitch-result-desc">${resultDescES(desc)}</div>`:''}`;
            }
          }catch(e){}
          pitchHTML=`<div class="pitch-area">
            <div class="zone-wrap"><div class="zone-label">ZONA</div>${zoneHTML(pX,pZ,szTop,szBot,isStrike,inPlay,isFoul)}</div>
            <div class="pitch-info">
              <div class="pitch-type">${pitchTypeES(pitchDesc)}</div>
              <div class="pitch-row">
                <div class="pitch-left">
                  ${mph?`<div class="pitch-mph">${Math.round(mph)}<span>MPH</span></div>`:''}
                  <div class="pitch-call ${callClass}">${callText}</div>
                </div>
                ${resultInPanel?`<div class="pitch-right">${resultInPanel}</div>`:''}
              </div>
            </div>
          </div>`;
        }
      }catch(e){}
      matchHTML=matchupHTML(raw,gd,ls);
    }
  }

  return `
    <div class="head">${headHTML}</div>
    <div class="score-area">
      <div class="team-side">${logoImg(away.id)}<div class="team-abbr">${awayAbbr}</div></div>
      <div class="score-block"><div class="score-num">${awayRuns}</div><div class="score-dash">—</div><div class="score-num">${homeRuns}</div></div>
      <div class="team-side home"><div class="team-abbr">${homeAbbr}</div>${logoImg(home.id)}</div>
    </div>
    ${stateHTML}${innHTML}${pitchHTML}${matchHTML}
    ${venue?`<div class="venue"><svg viewBox="0 0 24 24"><path d="M12 2L4 7v2h16V7l-8-5zM6 11v7H4v2h16v-2h-2v-7h-2v7h-3v-7h-2v7H8v-7H6z"/></svg>${venue}</div>`:''}`;
}

function render(raw1, raw2){
  return `<div class="dual-wrap">
    <div class="sh-medallion"><img src="${SH_LOGO}"></div>
    <div class="dual-card">
      <div class="ambient"></div>
      <div class="handles-row">
        <div class="handle main">
          <svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/></svg>
          @sporthausmx
        </div>
        <div class="handle">@jc__edge</div>
      </div>
      ${renderGame(raw1)}
      <div class="game-divider"></div>
      ${renderGame(raw2)}
    </div>
  </div>`;
}

async function fetchRaw(pk){
  const res = await fetch(`${STATSAPI}/api/v1.1/game/${pk}/feed/live`);
  return await res.json();
}

if(urlScale) applyScale(urlScale);

if(urlPk1 && urlPk2){
  async function tick(){
    try{
      const [r1,r2] = await Promise.all([fetchRaw(urlPk1), fetchRaw(urlPk2)]);
      document.getElementById('root').innerHTML = render(r1, r2);
    }catch(e){
      if(!document.querySelector('.dual-card'))
        document.getElementById('root').innerHTML='<div style="color:#444;font-size:13px;padding:20px">Cargando...</div>';
    }
  }
  tick();
  setInterval(tick, 8000);
}else{
  document.getElementById('root').style.display='none';
  document.getElementById('setup').style.display='block';
  const dateInput=document.getElementById('dateInput');
  dateInput.value=localDateStr();
  const scaleInput=document.getElementById('scaleInput');
  applyScale(scaleInput.value);

  document.getElementById('loadGamesBtn').addEventListener('click', async()=>{
    const opts='<option value="">— selecciona —</option>';
    document.getElementById('game1Select').innerHTML=opts+'<option>Cargando…</option>';
    document.getElementById('game2Select').innerHTML=opts+'<option>Cargando…</option>';
    try{
      const res=await fetch(`${STATSAPI}/api/v1/schedule?sportId=1&date=${dateInput.value}`);
      const data=await res.json();
      const games=(data.dates&&data.dates[0]&&data.dates[0].games)||[];
      if(!games.length){
        document.getElementById('game1Select').innerHTML='<option>Sin juegos esa fecha</option>';
        document.getElementById('game2Select').innerHTML='<option>Sin juegos esa fecha</option>';
        return;
      }
      const makeOpts=()=>{
        let o='<option value="">— selecciona —</option>';
        games.forEach(g=>{
          const t=new Date(g.gameDate).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
          o+=`<option value="${g.gamePk}">${g.teams.away.team.name} @ ${g.teams.home.team.name} — ${t}</option>`;
        });
        return o;
      };
      document.getElementById('game1Select').innerHTML=makeOpts();
      document.getElementById('game2Select').innerHTML=makeOpts();
    }catch(e){
      document.getElementById('game1Select').innerHTML='<option>Error al cargar</option>';
      document.getElementById('game2Select').innerHTML='<option>Error al cargar</option>';
    }
  });

  document.getElementById('manualBtn').addEventListener('click',()=>{
    const r=document.getElementById('manualRow');
    r.style.display=r.style.display==='none'?'flex':'none';
  });

  scaleInput.addEventListener('input',()=>{
    applyScale(scaleInput.value);
    document.getElementById('scaleReadout').textContent=scaleInput.value+'x';
    syncUrl();
  });

  function getSelectedPks(){
    const manual1=document.getElementById('pk1').value.trim();
    const manual2=document.getElementById('pk2').value.trim();
    const pk1=manual1||document.getElementById('game1Select').value;
    const pk2=manual2||document.getElementById('game2Select').value;
    return{pk1,pk2};
  }

  function syncUrl(){
    const{pk1,pk2}=getSelectedPks();
    if(!pk1||!pk2) return;
    const u=new URL(location.href); u.search='';
    u.searchParams.set('pk1',pk1); u.searchParams.set('pk2',pk2);
    u.searchParams.set('scale',scaleInput.value);
    document.getElementById('urlBox').value=u.toString();
  }

  let previewTimer=null;
  document.getElementById('useGamesBtn').addEventListener('click',async()=>{
    const{pk1,pk2}=getSelectedPks();
    if(!pk1||!pk2){alert('Selecciona dos juegos primero');return;}
    document.getElementById('resultsBlock').style.display='block';
    syncUrl();
    if(previewTimer) clearInterval(previewTimer);
    const mount=document.getElementById('previewMount');
    async function tick(){
      try{
        const[r1,r2]=await Promise.all([fetchRaw(pk1),fetchRaw(pk2)]);
        mount.innerHTML=render(r1,r2);
      }catch(e){mount.innerHTML='<div style="color:#333;font-size:12px;padding:16px">Error cargando juegos</div>';}
    }
    tick();
    previewTimer=setInterval(tick,8000);
  });

  document.getElementById('copyBtn').addEventListener('click',()=>{
    const inp=document.getElementById('urlBox'); inp.select();
    try{navigator.clipboard.writeText(inp.value);}catch(e){document.execCommand('copy');}
  });
}
</script>
</body>
</html>
